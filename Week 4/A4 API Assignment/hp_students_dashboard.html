<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hogwarts Students Dashboard</title>
  <style>
    :root {
      --bg: #0e0a07;
      --bg-soft: #1b130f;
      --card: rgba(34, 24, 16, 0.88);
      --muted: #d4c2a3;
      --text: #f3e9d8;
      --accent: #d4a017;
      --accent-2: #7f1d1d;
      --accent-3: #1e3a8a;
      --border: rgba(212, 160, 23, 0.28);
      --shadow: 0 14px 32px rgba(8, 5, 2, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", Times, serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      min-height: 100vh;
    }

    .container {
      max-width: 1140px;
      margin: 0 auto;
      padding: 28px 24px 36px;
    }

    .hero {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px 22px;
      margin-bottom: 20px;
      background: #2a1c14;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero-art {
      position: absolute;
      right: 0;
      top: 0;
      width: 390px;
      height: 100%;
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    .hero-art svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .wand {
      transform-origin: 230px 20px;
      animation: wandFloat 3.2s ease-in-out infinite;
    }

    .sparkle {
      transform-origin: center;
      animation: sparklePulse 1.8s ease-in-out infinite;
    }

    .sparkle-2 {
      animation-delay: 0.5s;
    }

    .sparkle-3 {
      animation-delay: 1s;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2.5vw, 2rem);
      letter-spacing: 0.02em;
      color: #f8e8bf;
      text-shadow: 0 1px 0 #000;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      font-size: 0.95rem;
    }

    .subtitle code {
      background: rgba(212, 160, 23, 0.13);
      border: 1px solid rgba(212, 160, 23, 0.4);
      color: #ffe8a6;
      border-radius: 6px;
      padding: 2px 6px;
    }

    .source-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      margin-top: 10px;
    }

    .source-row label {
      color: var(--muted);
      font-size: 0.92rem;
    }

    #dataSource {
      min-width: 220px;
    }

    .house-chart-container {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 24px;
    }

    .house-pie-svg {
      width: min(260px, 88vw);
      height: auto;
      flex-shrink: 0;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.35));
    }

    .house-pie-svg path {
      stroke: rgba(0, 0, 0, 0.35);
      stroke-width: 1;
    }

    svg .pie-slice {
      cursor: pointer;
      transform: translate(0, 0);
      transition: transform 0.35s ease-in-out;
      transform-origin: 100px 100px;
    }

    svg .pie-slice:hover {
      transform: translate(var(--dx), var(--dy));
    }

    svg .pie-slice path {
      transition: filter 0.2s ease-in-out;
    }

    svg .pie-slice:hover path {
      filter: brightness(1.12);
    }

    svg .pie-slice-label {
      opacity: 0;
      transition: opacity 0.26s ease-in-out;
      pointer-events: none;
      fill: #fffbeb;
      font-size: 13px;
      font-weight: 700;
      font-family: Georgia, "Times New Roman", serif;
      stroke: rgba(0, 0, 0, 0.65);
      stroke-width: 2.5px;
      paint-order: stroke fill;
    }

    svg .pie-slice:hover .pie-slice-label {
      opacity: 1;
    }

    .house-pie-legend {
      display: grid;
      gap: 8px;
      min-width: 200px;
    }

    .legend-row {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 10px;
      align-items: center;
      font-size: 0.92rem;
      color: #e8dcc8;
    }

    .legend-swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, 0.35);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px;
      box-shadow: var(--shadow);
    }

    .card .label {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .card .value {
      margin-top: 6px;
      font-size: 1.55rem;
      font-weight: 700;
      color: #ffe8a6;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1.06rem;
      letter-spacing: 0.01em;
    }

    .bar-list {
      display: grid;
      gap: 8px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 140px 1fr 45px;
      align-items: center;
      gap: 8px;
    }

    .bar-row .name {
      color: #d1d5db;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-wrap {
      background: #23160f;
      border: 1px solid #5c3c18;
      border-radius: 999px;
      overflow: hidden;
      height: 15px;
    }

    .bar {
      height: 100%;
      width: 0;
      border-radius: 999px;
      transition: width 450ms ease;
    }

    .bar.house {
      background: #9b6a13;
    }

    .bar.ancestry {
      background: #d4a017;
    }

    .count {
      text-align: right;
      color: #d1d5db;
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    input, select {
      background: #1e140f;
      color: var(--text);
      border: 1px solid #5e4422;
      border-radius: 10px;
      padding: 9px 11px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212, 160, 23, 0.2);
    }

    .table-wrap {
      max-height: 420px;
      overflow: auto;
      border: 1px solid #6a4a26;
      border-radius: 12px;
      background: #1a120d;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid #1f2937;
      font-size: 0.92rem;
    }

    th {
      color: #cbd5e1;
      position: sticky;
      top: 0;
      background: #2b1c13;
      z-index: 1;
      backdrop-filter: blur(4px);
    }

    tbody tr:hover td {
      background: rgba(212, 160, 23, 0.12);
    }

    .muted {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 8px;
    }

    .error {
      color: #fca5a5;
      font-weight: 600;
    }

    @media (max-width: 760px) {
      .bar-row {
        grid-template-columns: 90px 1fr 40px;
      }

      .hero-art {
        width: 250px;
        opacity: 0.3;
      }
    }

    @keyframes wandFloat {
      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
      }
      50% {
        transform: translateY(-4px) rotate(-2deg);
      }
    }

    @keyframes sparklePulse {
      0%,
      100% {
        opacity: 0.25;
        transform: scale(0.85);
      }
      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-content">
        <h1>Hogwarts Students Dashboard</h1>
        <div class="subtitle">Source: <code id="currentCsvLabel">hp_students_cleaned.csv</code></div>
        <div class="source-row">
          <label for="dataSource">Dataset</label>
          <select id="dataSource" aria-label="Choose CSV dataset">
            <option value="hp_students_cleaned.csv">Cleaned — complete rows only</option>
            <option value="hp_students_all.csv">All student rows from API</option>
          </select>
        </div>
      </div>
      <div class="hero-art" aria-hidden="true">
        <svg viewBox="0 0 300 140" xmlns="http://www.w3.org/2000/svg">
          <!-- Wand -->
          <g class="wand">
            <line x1="208" y1="22" x2="277" y2="6" stroke="#f5d27a" stroke-width="2.5" />
            <circle cx="203" cy="24" r="4" fill="#f5d27a" />
          </g>
          <!-- Sparkles -->
          <path class="sparkle sparkle-1" d="M186 17 l4 8 l8 4 l-8 4 l-4 8 l-4-8 l-8-4 l8-4z" fill="#f8e8bf" />
          <path class="sparkle sparkle-2" d="M170 34 l2 5 l5 2 l-5 2 l-2 5 l-2-5 l-5-2 l5-2z" fill="#f8e8bf" />
          <path class="sparkle sparkle-3" d="M240 33 l3 6 l6 3 l-6 3 l-3 6 l-3-6 l-6-3 l6-3z" fill="#f8e8bf" />
          <!-- Castle silhouette -->
          <path
            d="M42 122 h200 v-34 h-18 v-18 h-24 v18 h-10 v-30 h-22 v-16 h-10 v16 h-22 v30 h-10 v-22 h-20 v22 h-10 v-26 h-18 v26 h-12z"
            fill="#9ca3af"
          />
          <rect x="134" y="96" width="16" height="26" fill="#4b5563" />
          <rect x="78" y="98" width="10" height="10" fill="#f9e2a0" opacity="0.85" />
          <rect x="206" y="92" width="10" height="10" fill="#f9e2a0" opacity="0.85" />
        </svg>
      </div>
    </div>

    <div id="status" class="panel">Loading data...</div>

    <div id="dashboard" hidden>
      <div class="grid">
        <div class="card">
          <div class="label">Total Students</div>
          <div id="totalStudents" class="value">0</div>
        </div>
        <div class="card">
          <div class="label">Unique Houses</div>
          <div id="uniqueHouses" class="value">0</div>
        </div>
        <div class="card">
          <div class="label">Unique Ancestries</div>
          <div id="uniqueAncestries" class="value">0</div>
        </div>
      </div>

      <div class="panel">
        <h2>House Breakdown</h2>
        <div id="houseBars" class="house-chart-container"></div>
      </div>

      <div class="panel">
        <h2>Ancestry Breakdown</h2>
        <div id="ancestryBars" class="bar-list"></div>
      </div>

      <div class="panel">
        <h2>Student Table</h2>
        <div class="controls">
          <input id="searchInput" type="text" placeholder="Search name..." />
          <select id="houseFilter">
            <option value="">All houses</option>
          </select>
          <select id="ancestryFilter">
            <option value="">All ancestries</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>House</th>
                <th>Ancestry</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div id="rowCount" class="muted"></div>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_CSV = "hp_students_cleaned.csv";
    const statusEl = document.getElementById("status");
    const dashboardEl = document.getElementById("dashboard");
    const totalStudentsEl = document.getElementById("totalStudents");
    const uniqueHousesEl = document.getElementById("uniqueHouses");
    const uniqueAncestriesEl = document.getElementById("uniqueAncestries");
    const houseBarsEl = document.getElementById("houseBars");
    const ancestryBarsEl = document.getElementById("ancestryBars");
    const tableBodyEl = document.getElementById("tableBody");
    const rowCountEl = document.getElementById("rowCount");
    const searchInput = document.getElementById("searchInput");
    const houseFilter = document.getElementById("houseFilter");
    const ancestryFilter = document.getElementById("ancestryFilter");
    const dataSourceEl = document.getElementById("dataSource");
    const currentCsvLabel = document.getElementById("currentCsvLabel");

    let students = [];
    let listenersBound = false;

    function parseCsvLine(line) {
      const out = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i += 1) {
        const ch = line[i];
        if (ch === '"') {
          const next = line[i + 1];
          if (inQuotes && next === '"') {
            current += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes) {
          out.push(current);
          current = "";
        } else {
          current += ch;
        }
      }

      out.push(current);
      return out;
    }

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const headers = parseCsvLine(lines[0]).map((h) => h.trim().toLowerCase());
      return lines.slice(1).map((line) => {
        const cols = parseCsvLine(line);
        const record = {};
        headers.forEach((h, i) => {
          record[h] = (cols[i] ?? "").trim();
        });
        return record;
      });
    }

    function countBy(items, key) {
      const counts = {};
      items.forEach((item) => {
        const value = item[key] || "Unknown";
        counts[value] = (counts[value] || 0) + 1;
      });
      return Object.entries(counts).sort((a, b) => b[1] - a[1]);
    }

    function renderBars(targetEl, counts, typeClass) {
      targetEl.innerHTML = "";
      const maxCount = counts.length ? counts[0][1] : 1;

      counts.forEach(([label, count]) => {
        const row = document.createElement("div");
        row.className = "bar-row";
        row.innerHTML = `
          <div class="name">${label}</div>
          <div class="bar-wrap">
            <div class="bar ${typeClass}" style="width: ${(count / maxCount) * 100}%"></div>
          </div>
          <div class="count">${count}</div>
        `;
        targetEl.appendChild(row);
      });
    }

    /** Hogwarts-inspired colors (primary house tones). */
    function houseFill(houseLabel) {
      const key = (houseLabel || "").trim().toLowerCase();
      if (key === "gryffindor") return "#740001";
      if (key === "slytherin") return "#1a472a";
      if (key === "ravenclaw") return "#0e1a40";
      if (key === "hufflepuff") return "#ecb939";
      return "#6b7280";
    }

    function pieSlicePath(cx, cy, r, startRad, endRad) {
      const x1 = cx + r * Math.cos(startRad);
      const y1 = cy + r * Math.sin(startRad);
      const x2 = cx + r * Math.cos(endRad);
      const y2 = cy + r * Math.sin(endRad);
      const sweep = endRad > startRad ? 1 : 0;
      const largeArc = Math.abs(endRad - startRad) > Math.PI ? 1 : 0;
      return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} ${sweep} ${x2} ${y2} Z`;
    }

    function renderHousePieChart(containerEl, counts) {
      containerEl.innerHTML = "";
      const total = counts.reduce((sum, [, c]) => sum + c, 0);
      if (!total) return;

      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("viewBox", "0 0 200 200");
      svg.setAttribute("class", "house-pie-svg");
      svg.setAttribute("role", "img");
      svg.setAttribute("aria-label", "Students by Hogwarts house");

      const cx = 100;
      const cy = 100;
      const r = 88;
      let cumulative = 0;
      const popDistance = 14;

      counts.forEach(([label, count]) => {
        const startRad = -Math.PI / 2 + (cumulative / total) * 2 * Math.PI;
        const endRad = -Math.PI / 2 + ((cumulative + count) / total) * 2 * Math.PI;
        const midRad = (startRad + endRad) / 2;
        cumulative += count;

        const pct = ((count / total) * 100).toFixed(1);

        const group = document.createElementNS(svgNS, "g");
        group.setAttribute("class", "pie-slice");

        const path = document.createElementNS(svgNS, "path");
        path.setAttribute("d", pieSlicePath(cx, cy, r, startRad, endRad));
        path.setAttribute("fill", houseFill(label));
        path.setAttribute("data-house", label);

        const tip = document.createElementNS(svgNS, "title");
        tip.textContent = `${label || "Unknown"} — ${count} students (${pct}%)`;

        const dx = popDistance * Math.cos(midRad);
        const dy = popDistance * Math.sin(midRad);
        group.style.setProperty("--dx", `${dx}px`);
        group.style.setProperty("--dy", `${dy}px`);

        const labelR = r * 0.52;
        const tx = cx + labelR * Math.cos(midRad);
        const ty = cy + labelR * Math.sin(midRad);
        const pctText = document.createElementNS(svgNS, "text");
        pctText.setAttribute("class", "pie-slice-label");
        pctText.setAttribute("x", String(tx));
        pctText.setAttribute("y", String(ty));
        pctText.setAttribute("text-anchor", "middle");
        pctText.setAttribute("dominant-baseline", "middle");
        pctText.textContent = `${pct}%`;

        group.appendChild(tip);
        group.appendChild(path);
        group.appendChild(pctText);

        group.addEventListener("mouseenter", () => {
          svg.appendChild(group);
        });

        svg.appendChild(group);
      });

      const legend = document.createElement("div");
      legend.className = "house-pie-legend";

      counts.forEach(([label, count]) => {
        const row = document.createElement("div");
        row.className = "legend-row";

        const swatch = document.createElement("span");
        swatch.className = "legend-swatch";
        swatch.style.background = houseFill(label);

        const nameEl = document.createElement("span");
        nameEl.textContent = label || "Unknown";

        const cntEl = document.createElement("span");
        cntEl.textContent = String(count);
        cntEl.style.color = "#d4c2a3";

        row.appendChild(swatch);
        row.appendChild(nameEl);
        row.appendChild(cntEl);
        legend.appendChild(row);
      });

      containerEl.appendChild(svg);
      containerEl.appendChild(legend);
    }

    function getFilteredRows() {
      const q = searchInput.value.trim().toLowerCase();
      const selectedHouse = houseFilter.value;
      const selectedAncestry = ancestryFilter.value;

      return students.filter((s) => {
        const matchesName = !q || (s.name || "").toLowerCase().includes(q);
        const matchesHouse = !selectedHouse || s.house === selectedHouse;
        const matchesAncestry = !selectedAncestry || s.ancestry === selectedAncestry;
        return matchesName && matchesHouse && matchesAncestry;
      });
    }

    function renderTable(rows) {
      tableBodyEl.innerHTML = "";
      rows.forEach((s) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${s.name}</td><td>${s.house}</td><td>${s.ancestry}</td>`;
        tableBodyEl.appendChild(tr);
      });
      rowCountEl.textContent = `Showing ${rows.length} of ${students.length} students`;
    }

    function resetFilterSelects() {
      houseFilter.innerHTML = '<option value="">All houses</option>';
      ancestryFilter.innerHTML = '<option value="">All ancestries</option>';
    }

    function renderFilters() {
      resetFilterSelects();
      const houses = [...new Set(students.map((s) => s.house))].sort();
      const ancestries = [...new Set(students.map((s) => s.ancestry))].sort();

      houses.forEach((house) => {
        const opt = document.createElement("option");
        opt.value = house;
        opt.textContent = house;
        houseFilter.appendChild(opt);
      });

      ancestries.forEach((ancestry) => {
        const opt = document.createElement("option");
        opt.value = ancestry;
        opt.textContent = ancestry;
        ancestryFilter.appendChild(opt);
      });
    }

    function updateTable() {
      renderTable(getFilteredRows());
    }

    async function loadDashboard(csvFile) {
      statusEl.hidden = false;
      statusEl.className = "panel";
      statusEl.textContent = "Loading data...";
      dashboardEl.hidden = true;
      currentCsvLabel.textContent = csvFile;

      try {
        const response = await fetch(csvFile);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const text = await response.text();
        students = parseCsv(text);

        if (!students.length) throw new Error("CSV has no data rows.");

        const houseCounts = countBy(students, "house");
        const ancestryCounts = countBy(students, "ancestry");

        totalStudentsEl.textContent = String(students.length);
        uniqueHousesEl.textContent = String(houseCounts.length);
        uniqueAncestriesEl.textContent = String(ancestryCounts.length);

        renderHousePieChart(houseBarsEl, houseCounts);
        renderBars(ancestryBarsEl, ancestryCounts, "ancestry");
        renderFilters();
        searchInput.value = "";
        updateTable();

        if (!listenersBound) {
          searchInput.addEventListener("input", updateTable);
          houseFilter.addEventListener("change", updateTable);
          ancestryFilter.addEventListener("change", updateTable);
          dataSourceEl.addEventListener("change", () => {
            loadDashboard(dataSourceEl.value);
          });
          listenersBound = true;
        }

        statusEl.hidden = true;
        dashboardEl.hidden = false;
      } catch (err) {
        statusEl.className = "panel error";
        statusEl.textContent =
          `Could not load ${csvFile}. Start a local server in this folder and open the HTML via http://localhost. Error: ${err.message}`;
        dashboardEl.hidden = true;
      }
    }

    loadDashboard(dataSourceEl.value || DEFAULT_CSV);
  </script>
</body>
</html>
